controller_manager:
  ros__parameters:
    update_rate: 1000

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    panda_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    panda_hand_controller:
      type: joint_trajectory_controller/JointTrajectoryController

# Arm: effort command + PID gains (Gazebo Classic needs effort/PID for stable physics)
panda_arm_controller:
  ros__parameters:
    joints:
      - panda_joint1
      - panda_joint2
      - panda_joint3
      - panda_joint4
      - panda_joint5
      - panda_joint6
      - panda_joint7
    command_interfaces: [effort]
    state_interfaces: [position, velocity]
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    gains:
      panda_joint1: {p: 50.0,    i: 0.0, d: 20.0,  i_clamp: 0.0, ff_velocity_scale: 1.0}
      panda_joint2: {p: 10000.0, i: 0.0, d: 500.0, i_clamp: 0.0, ff_velocity_scale: 1.0}
      panda_joint3: {p: 100.0,   i: 0.0, d: 10.0,  i_clamp: 0.0, ff_velocity_scale: 1.0}
      panda_joint4: {p: 1000.0,  i: 0.0, d: 50.0,  i_clamp: 0.0, ff_velocity_scale: 1.0}
      panda_joint5: {p: 100.0,   i: 0.0, d: 10.0,  i_clamp: 0.0, ff_velocity_scale: 1.0}
      panda_joint6: {p: 100.0,   i: 0.0, d: 10.0,  i_clamp: 0.0, ff_velocity_scale: 1.0}
      panda_joint7: {p: 10.0,    i: 0.5, d: 0.1,   i_clamp: 0.0, ff_velocity_scale: 1.0}
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 15.0
      panda_joint1: {goal: 0.15}
      panda_joint2: {goal: 0.15}
      panda_joint3: {goal: 0.15}
      panda_joint4: {goal: 0.15}
      panda_joint5: {goal: 0.15}
      panda_joint6: {goal: 0.15}
      panda_joint7: {goal: 0.15}

# Gripper: position command (fingers are horizontal, no gravity issues)
panda_hand_controller:
  ros__parameters:
    joints:
      - panda_finger_joint1
      - panda_finger_joint2
    command_interfaces: [position]
    state_interfaces: [position, velocity]
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 5.0
      panda_finger_joint1: {goal: 0.005}
      panda_finger_joint2: {goal: 0.005}
